aid: costar
name: CoStar Group
url: https://raw.githubusercontent.com/api-evangelist/costar/refs/heads/main/apis.yml
description: >-
  CoStar Group is the dominant commercial and residential real estate data,
  analytics, and marketplace company. The portfolio spans the flagship CoStar
  commercial real estate intelligence platform, LoopNet (CRE marketplace),
  Apartments.com network (residential rentals, including ForRent.com and
  Westside Rentals), Homes.com and Homesnap (for-sale residential), Ten-X
  (online CRE auctions), BizBuySell (business-for-sale marketplace), STR
  (hotel data), Visual Lease (lease management), Matterport (3D spatial
  capture), and international properties including OnTheMarket (UK),
  Emporis (Germany), and a controlling stake in Domain Group (Australia).
  Distribution to partners is via enterprise data licensing, syndication
  feeds, and brand-specific marketplace tooling rather than a public
  self-serve developer portal.
kind: company
